name: Server Auto Renew

on:
  schedule:
    - cron: '37 6 * * *' # 每天北京时间 14:37 自动运行
  workflow_dispatch: # 允许手动点击运行

jobs:
  renew_job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run renew script
      env:
        MY_EMAIL: ${{ secrets.MY_EMAIL }}
        MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
        ANON_KEY: ${{ secrets.ANON_KEY }}
        SCKEY: ${{ secrets.SCKEY }}
      run: python renew.py | tee renew.log

    - name: Send Telegram Notification
      if: always()
      env:
        TG_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_ID: ${{ secrets.TG_USER_ID }}
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          TITLE="✅ Freemchost 自动续期成功！"
        else
          TITLE="❌ Freemchost 自动续期失败！"
        fi
        
        # 抓取干净格式化的三行关键指标
        INFO_SUMMARY=$(grep -E "服务器名称|当前状态|到期时间" renew.log | sed 's/"//g')
        
        if [ -z "$INFO_SUMMARY" ]; then
          INFO_SUMMARY=$(tail -n 5 renew.log | sed 's/"//g')
        fi
        
        # 精简后的极简小卡片排版
        MSG_TEXT=$(cat <<EOF
        ${TITLE}
        
        ${INFO_SUMMARY}
        
        🔗 [查看工作流详情](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
        EOF
        )
        
        curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
          --data-urlencode "chat_id=${TG_ID}" \
          --data-urlencode "text=${MSG_TEXT}" \
          --data-urlencode "parse_mode=Markdown" \
          --data-urlencode "link_preview_options={\"is_disabled\":true}"
